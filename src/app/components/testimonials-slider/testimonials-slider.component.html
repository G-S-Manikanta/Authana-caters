<section class="testimonials-section">
  <div class="container">
    <h2 class="section-title text-center">Words From Our Clients</h2>
    <div class="testimonial-slider-container">
      <div class="testimonial-slide" *ngFor="let testimonial of testimonials; let i = index" [ngClass]="{ active: i === currentTestimonial }">
        <div class="testimonial-content">
          <div class="testimonial-photo">
            <img [src]="testimonial.photo" [alt]="testimonial.name">
          </div>
          <div class="testimonial-details">
            <div class="star-rating">
              <i *ngFor="let starClass of getStarRating(testimonial.rating)" [class]="starClass"></i>
            </div>
            <p class="testimonial-review">"{{ testimonial.review }}"</p>
            <p class="testimonial-name">{{ testimonial.name }}</p>
            <p class="testimonial-event">{{ testimonial.eventType }}</p>
          </div>
        </div>
      </div>
      <div class="slider-navigation">
        <button class="nav-button prev" (click)="previousTestimonial()"><i class="fas fa-arrow-left"></i></button>
        <button class="nav-button next" (click)="nextTestimonial()"><i class="fas fa-arrow-right"></i></button>
      </div>
    </div>
  </div>
</section>
