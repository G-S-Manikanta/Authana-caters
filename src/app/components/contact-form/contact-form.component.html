<div class="contact-form-container">
  <div *ngIf="formSubmitted" class="success-message">
    <p>Thank you for your message! We will get back to you shortly.</p>
  </div>
  <div *ngIf="formError" class="error-message">
    <p>Please fill out all required fields correctly.</p>
  </div>

  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
    <div class="form-row">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" formControlName="name" class="form-control" placeholder="Full Name">
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" formControlName="phone" class="form-control" placeholder="Phone Number">
      </div>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" class="form-control" placeholder="Email Address">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="eventType">Event Type</label>
        <select id="eventType" formControlName="eventType" class="form-control">
          <option value="" disabled>Select an event type</option>
          <option value="wedding">Wedding</option>
          <option value="corporate">Corporate</option>
          <option value="birthday">Birthday</option>
          <option value="private">Private Dining</option>
          <option value="outdoor">Outdoor Catering</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="eventDate">Event Date</label>
        <input type="date" id="eventDate" formControlName="eventDate" class="form-control">
      </div>
    </div>
    <div class="form-group">
        <label for="guestCount">Guest Count</label>
        <input type="number" id="guestCount" formControlName="guestCount" class="form-control" placeholder="Number of Guests">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" formControlName="message" rows="5" class="form-control" placeholder="Tell us more about your event..."></textarea>
    </div>
    <button type="submit" class="btn-submit" [disabled]="contactForm.invalid">Submit Inquiry</button>
  </form>
</div>
